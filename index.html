<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaomi AI - Neural Interface</title>
    <style>
        /* =========================================
           1. CSS VARIABLES & THEME (XIAOMI ORANGE/BLACK)
        ========================================= */
        :root {
            --bg-base: #0a0a0a;
            --bg-panel: #141414;
            --bg-input: #1f1f1f;
            --primary-orange: #ff6900;
            --primary-hover: #e05d00;
            --text-main: #f0f0f0;
            --text-muted: #888888;
            --border-color: #2a2a2a;
            --user-bubble: #252525;
            --ai-bubble: #ff6900;
            --shadow-glow: rgba(255, 105, 0, 0.15);
            --font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        /* =========================================
           2. RESET & BASE STYLES
        ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            line-height: 1.6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-orange);
        }

        /* =========================================
           3. LAYOUT: SIDEBAR
        ========================================= */
        .sidebar {
            width: 280px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .brand {
            padding: 24px 20px;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--primary-orange);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-icon {
            width: 24px;
            height: 24px;
            background: var(--primary-orange);
            border-radius: 4px;
            display: inline-block;
        }

        .new-chat-btn {
            margin: 20px;
            padding: 12px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .new-chat-btn:hover {
            background-color: var(--bg-input);
            border-color: var(--primary-orange);
            color: var(--primary-orange);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
        }

        .history-item {
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s;
        }

        .history-item:hover {
            background-color: var(--bg-input);
            color: var(--text-main);
        }

        /* =========================================
           4. LAYOUT: MAIN CHAT AREA
        ========================================= */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-base);
            position: relative;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .message-row {
            display: flex;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.ai {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 1rem;
            animation: fadeIn 0.3s ease-out forwards;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble.user-bubble {
            background-color: var(--user-bubble);
            border: 1px solid var(--border-color);
            border-bottom-right-radius: 2px;
        }

        .bubble.ai-bubble {
            background-color: var(--ai-bubble);
            color: #000; /* High contrast text on orange */
            font-weight: 500;
            border-bottom-left-radius: 2px;
            box-shadow: 0 4px 20px var(--shadow-glow);
        }

        /* Markdown Styles inside AI Bubble */
        .ai-bubble pre {
            background: #000;
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        .ai-bubble code {
            font-family: monospace;
            background: rgba(0,0,0,0.1);
            padding: 2px 4px;
            border-radius: 4px;
        }

        /* =========================================
           5. INPUT AREA
        ========================================= */
        .input-container {
            padding: 20px 40px 40px 40px;
            background: linear-gradient(180deg, transparent, var(--bg-base) 20%);
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 850px;
            position: relative;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary-orange);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 18px 60px 18px 20px;
            font-size: 1rem;
            font-family: var(--font-family);
            resize: none;
            outline: none;
            max-height: 200px;
            overflow-y: auto;
            display: block;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            width: 36px;
            height: 36px;
            background-color: var(--primary-orange);
            border: none;
            border-radius: 10px;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            gap: 4px;
            padding: 10px 16px;
            background: transparent;
        }
        .dot {
            width: 6px;
            height: 6px;
            background-color: #000;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                z-index: 10;
                height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .input-container {
                padding: 10px 20px 20px 20px;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <span class="brand-icon"></span>
            XIAOMI AI
        </div>
        <button class="new-chat-btn" onclick="UI.startNewChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New Session
        </button>
        <div class="history-list" id="historyList">
            </div>
    </aside>

    <main class="main-chat">
        <div class="chat-container" id="chatContainer">
            <div class="message-row ai">
                <div class="bubble ai-bubble">
                    ระบบพร้อมใช้งาน ฉันคือ Xiaomi AI. มีอะไรให้ฉันช่วยประมวลผลหรือไม่?
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    id="userInput" 
                    rows="1" 
                    placeholder="ป้อนคำสั่งที่นี่..." 
                    oninput="UI.autoResize(this)"
                    onkeydown="UI.handleEnter(event)"></textarea>
                <button id="sendBtn" class="send-btn" onclick="App.handleSend()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        /**
         * ==================================================================
         * CONFIGURATION & CONSTANTS
         * ==================================================================
         */
        const CONFIG = {
            // ระบบถูกออกแบบมาให้รองรับ API แบบ Google Gemini Structure
            API_KEY: "AIzaSyBks9C41uSPKClL2Np-KGb9vNjIeOz60i8", 
            API_URL: "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent"
        };

        /**
         * ==================================================================
         * UTILITY: LIGHTWEIGHT MARKDOWN PARSER
         * แปลงข้อความดิบให้เป็น HTML Structure โดยไม่พึ่งไลบรารี
         * ==================================================================
         */
        const Parser = {
            parseMarkdown(text) {
                if (!text) return "";
                let html = text
                    // Parse Code Blocks (```code```)
                    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                    // Parse Inline Code (`code`)
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    // Parse Bold (**text**)
                    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                    // Parse Italic (*text*)
                    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                    // Line Breaks
                    .replace(/\n/g, '<br>');
                return html;
            }
        };

        /**
         * ==================================================================
         * UI CONTROLLER
         * จัดการ DOM, Animation, และ Interaction อย่างเต็มประสิทธิภาพ
         * ==================================================================
         */
        const UI = {
            elements: {
                chatContainer: document.getElementById('chatContainer'),
                userInput: document.getElementById('userInput'),
                sendBtn: document.getElementById('sendBtn'),
                historyList: document.getElementById('historyList')
            },

            autoResize(textarea) {
                textarea.style.height = 'auto';
                textarea.style.height = textarea.scrollHeight + 'px';
                if (textarea.value.trim() === '') {
                    textarea.style.height = 'auto'; // Reset when empty
                }
            },

            handleEnter(event) {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    App.handleSend();
                }
            },

            scrollToBottom() {
                this.elements.chatContainer.scrollTop = this.elements.chatContainer.scrollHeight;
            },

            appendMessage(sender, text, isMarkdown = false) {
                const row = document.createElement('div');
                row.className = `message-row ${sender}`;
                
                const bubble = document.createElement('div');
                bubble.className = `bubble ${sender}-bubble`;
                
                if (isMarkdown && sender === 'ai') {
                    bubble.innerHTML = Parser.parseMarkdown(text);
                } else {
                    bubble.textContent = text;
                }

                row.appendChild(bubble);
                this.elements.chatContainer.appendChild(row);
                this.scrollToBottom();
                return bubble; // Return element for updating later if streaming
            },

            showTyping() {
                const row = document.createElement('div');
                row.className = 'message-row ai';
                row.id = 'typingIndicator';
                row.innerHTML = `
                    <div class="bubble ai-bubble typing-indicator" style="display:flex;">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                `;
                this.elements.chatContainer.appendChild(row);
                this.scrollToBottom();
            },

            hideTyping() {
                const indicator = document.getElementById('typingIndicator');
                if (indicator) indicator.remove();
            },

            disableInput() {
                this.elements.userInput.disabled = true;
                this.elements.sendBtn.disabled = true;
            },

            enableInput() {
                this.elements.userInput.disabled = false;
                this.elements.sendBtn.disabled = false;
                this.elements.userInput.value = '';
                this.autoResize(this.elements.userInput);
                this.elements.userInput.focus();
            },

            startNewChat() {
                this.elements.chatContainer.innerHTML = `
                    <div class="message-row ai">
                        <div class="bubble ai-bubble">
                            เซสชั่นใหม่เริ่มต้นขึ้นแล้ว มีอะไรให้ฉันประมวลผล?
                        </div>
                    </div>
                `;
            }
        };

        /**
         * ==================================================================
         * APPLICATION LOGIC (THE BRAIN)
         * จัดการ Fetch API และ Data Flow
         * ==================================================================
         */
        const App = {
            async handleSend() {
                const inputElement = UI.elements.userInput;
                const text = inputElement.value.trim();

                if (!text) return;

                // 1. Render User Message
                UI.appendMessage('user', text);
                UI.disableInput();
                UI.showTyping();

                // 2. Fetch AI Response
                try {
                    const response = await this.callAI(text);
                    UI.hideTyping();
                    UI.appendMessage('ai', response, true);
                } catch (error) {
                    UI.hideTyping();
                    UI.appendMessage('ai', `[System Error]: ${error.message}`, false);
                    console.error(error);
                } finally {
                    UI.enableInput();
                }
            },

            async callAI(prompt) {
                // สร้าง Request Body รูปแบบที่เข้ากับ Gemini/Google API structure
                const payload = {
                    contents: [{
                        parts: [{
                            text: prompt
                        }]
                    }]
                };

                try {
                    const response = await fetch(`${CONFIG.API_URL}?key=${CONFIG.API_KEY}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP Error Status: ${response.status}`);
                    }

                    const data = await response.json();
                    
                    // Parse Response Structure
                    if (data.candidates && data.candidates.length > 0) {
                        return data.candidates[0].content.parts[0].text;
                    } else {
                        return "ประมวลผลล้มเหลว ไม่พบข้อมูลส่งกลับจากเซิร์ฟเวอร์";
                    }

                } catch (error) {
                    throw new Error("ไม่สามารถเชื่อมต่อกับ Neural Network ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตหรือ API Key");
                }
            }
        };

        // Initialize Focus
        window.onload = () => UI.elements.userInput.focus();

    </script>
</body>
</html>
