<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaomi AI - Vision</title>
    <style>
        /* Xiaomi Minimalism Theme */
        body {
            background-color: #f7f7f7;
            color: #333;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 95%;
            max-width: 500px;
            height: 80vh;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 6px solid #ff6700;
        }
        .header {
            padding: 20px;
            text-align: center;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .header h2 {
            margin: 0;
            color: #ff6700;
            font-size: 20px;
            letter-spacing: 1px;
        }
        #chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fafafa;
        }
        .msg { margin-bottom: 15px; padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.5; }
        .user-msg { background: #ff6700; color: white; align-self: flex-end; margin-left: auto; }
        .ai-msg { background: #e9e9eb; color: #333; align-self: flex-start; }
        
        .input-area {
            padding: 20px;
            background: #fff;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }
        input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: 0.2s;
        }
        input:focus { border-color: #ff6700; }
        button {
            padding: 10px 20px;
            background: #ff6700;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>XIAOMI AI</h2>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="พิมพ์ข้อความของคุณ..." onkeypress="if(event.key === 'Enter') askAI()">
        <button id="sendBtn" onclick="askAI()">ส่ง</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBks9C41uSPKClL2Np-KGb9vNjIeOz60i8"; // ใส่ Key ให้แล้วครับ
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    async function askAI() {
        const inputField = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('sendBtn');
        const text = inputField.value.trim();

        if (!text) return;

        // แสดงข้อความของผู้ใช้
        chatBox.innerHTML += `<div class="msg user-msg"><b>คุณ:</b> ${text}</div>`;
        inputField.value = '';
        
        // แสดงสถานะรอ
        const loadingDiv = document.createElement("div");
        loadingDiv.className = "msg ai-msg";
        loadingDiv.innerHTML = `<b>Xiaomi AI:</b> ขอเวลาคิดสักครู่...`;
        chatBox.appendChild(loadingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        sendBtn.disabled = true;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;

            // ลบข้อความ "ขอเวลาคิด" ออกแล้วแทนที่ด้วยคำตอบจริง
            loadingDiv.innerHTML = `<b>Xiaomi AI:</b> ${aiText}`;
        } catch (error) {
            loadingDiv.innerHTML = `<b>Xiaomi AI:</b> ขออภัย ระบบขัดข้อง กรุณาลองใหม่ครับ`;
            console.error(error);
        }

        sendBtn.disabled = false;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
